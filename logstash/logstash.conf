input {
  beats {
    port => 5044
  }
  
  tcp {
    port => 5000
    codec => json_lines
  }
  
  udp {
    port => 5001
    codec => json
  }
}

filter {
  # Parse timestamp
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Add environment and service info
  mutate {
    add_field => { 
      "[@metadata][environment]" => "${ELK_ENVIRONMENT:development}"
      "[@metadata][service]" => "currentdao-backend"
    }
  }

  # Parse log levels
  if [level] {
    mutate {
      add_field => { "log_level" => "%{level}" }
    }
    
    # Set severity based on log level
    if [level] == "error" or [level] == "fatal" {
      mutate { add_field => { "severity" => "high" } }
    } else if [level] == "warn" {
      mutate { add_field => { "severity" => "medium" } }
    } else {
      mutate { add_field => { "severity" => "low" } }
    }
  }

  # Parse HTTP request information
  if [method] and [url] {
    mutate {
      add_field => { 
        "http_info" => "%{method} %{url}"
        "endpoint" => "%{method} %{url}"
      }
    }
  }

  # Parse user agent
  if [user_agent] and [user_agent] != "Unknown" {
    useragent {
      source => "user_agent"
      target => "user_agent_parsed"
    }
  }

  # Parse IP geolocation
  if [ip_address] and [ip_address] != "unknown" {
    geoip {
      source => "ip_address"
      target => "geoip"
    }
  }

  # Extract blockchain transaction information
  if [tx_hash] {
    mutate {
      add_field => { 
        "blockchain_info" => "tx:%{tx_hash}"
        "has_blockchain_tx" => true
      }
    }
  }

  # Parse security events
  if [security_event] {
    mutate {
      add_field => { 
        "is_security_event" => true
        "security_category" => "%{security_event}"
      }
    }
    
    # Add security severity mapping
    if [security_severity] == "critical" {
      mutate { add_field => { "threat_level" => 10 } }
    } else if [security_severity] == "high" {
      mutate { add_field => { "threat_level" => 7 } }
    } else if [security_severity] == "medium" {
      mutate { add_field => { "threat_level" => 4 } }
    } else if [security_severity] == "low" {
      mutate { add_field => { "threat_level" => 1 } }
    }
  }

  # Parse performance metrics
  if [response_time] {
    mutate {
      convert => { "response_time" => "integer" }
      add_field => { "has_performance_metrics" => true }
    }
    
    # Categorize response times
    if [response_time] > 5000 {
      mutate { add_field => { "performance_category" => "very_slow" } }
    } else if [response_time] > 1000 {
      mutate { add_field => { "performance_category" => "slow" } }
    } else if [response_time] > 500 {
      mutate { add_field => { "performance_category" => "moderate" } }
    } else {
      mutate { add_field => { "performance_category" => "fast" } }
    }
  }

  # Parse memory and CPU usage
  if [memory_usage] {
    mutate {
      convert => { "memory_usage" => "float" }
      add_field => { "has_system_metrics" => true }
    }
  }

  if [cpu_usage] {
    mutate {
      convert => { "cpu_usage" => "float" }
      add_field => { "has_system_metrics" => true }
    }
  }

  # Extract error information
  if [error_name] or [error_message] {
    mutate {
      add_field => { 
        "is_error" => true
        "error_occurred" => true
      }
    }
    
    # Extract error patterns
    if [error_message] {
      grok {
        match => { 
          "error_message" => [
            "%{WORD:exception_type}: %{GREEDYDATA:exception_message}",
            "%{GREEDYDATA:generic_error}"
          ]
        }
        tag_on_failure => ["_grok_error_parse_failure"]
      }
    }
  }

  # Parse tags for better categorization
  if [tags] {
    mutate {
      add_field => { "has_tags" => true }
    }
    
    # Categorize by tags
    if "database" in [tags] {
      mutate { add_field => { "category" => "database" } }
    }
    if "security" in [tags] {
      mutate { add_field => { "category" => "security" } }
    }
    if "performance" in [tags] {
      mutate { add_field => { "category" => "performance" } }
    }
    if "blockchain" in [tags] {
      mutate { add_field => { "category" => "blockchain" } }
    }
    if "api" in [tags] or "http-request" in [tags] {
      mutate { add_field => { "category" => "api" } }
    }
  }

  # Add correlation ID for traceability
  if [correlation_id] {
    mutate {
      add_field => { 
        "trace_id" => "%{correlation_id}"
        "has_correlation_id" => true
      }
    }
  }

  # Clean up sensitive data
  mutate {
    remove_field => [ "password", "token", "secret", "key" ]
  }

  # Add processing timestamp
  mutate {
    add_field => { 
      "processed_at" => "%{+yyyy-MM-dd'T'HH:mm:ss.SSSZ}"
      "logstash_version" => "7.x"
    }
  }

  # Set index name based on date and log type
  if [category] {
    mutate {
      add_field => { 
        "[@metadata][index]" => "currentdao-logs-%{+YYYY.MM.dd}-%{category}"
      }
    }
  } else {
    mutate {
      add_field => { 
        "[@metadata][index]" => "currentdao-logs-%{+YYYY.MM.dd}"
      }
    }
  }
}

output {
  # Main Elasticsearch output
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
    index => "%{[@metadata][index]}"
    template_name => "currentdao-logs-template"
    template => "/usr/share/logstash/templates/currentdao-logs-template.json"
    template_overwrite => true
    template_pattern => "currentdao-logs-*"
    
    # Performance settings for high throughput
    flush_size => 1000
    idle_flush_time => 5
    
    # Retry settings
    retry_on_conflict => 3
    retry_max_interval => 5
    retry_max_items => 500
    
    # Authentication (if enabled)
    user => "${ELASTICSEARCH_USER:}"
    password => "${ELASTICSEARCH_PASSWORD:}"
    
    # SSL settings (if enabled)
    ssl => "${ELASTICSEARCH_SSL:false}"
    ssl_certificate_verification => "${ELASTICSEARCH_SSL_VERIFICATION:true}"
    
    # Pipeline settings
    pipeline => "currentdao-logs-pipeline"
  }

  # Debug output (for development)
  if [@metadata][environment] == "development" {
    stdout {
      codec => rubydebug
    }
  }

  # Error output
  if "_grokparsefailure" in [tags] or "_jsonparsefailure" in [tags] {
    file {
      path => "/usr/share/logstash/logs/parsing-errors.log"
      codec => json_lines
    }
  }
}
